schema_version: "1.0"

extension:
  id: clickup-sync
  name: "ClickUp Task Sync"
  version: "1.0.0"
  description: "The ClickUp plug of snackbyte-speckit-engine. Mirrors each Spec Kit feature into ClickUp as one feature-card in a shared list, with a subtask per user story (native dependency links), a markdown checkbox list of the tasks.md lines, a verbose body, and a six-state lifecycle status (open→in-design→ready→in-development→in-review→done) that advances on every command. Adds /speckit-verify (earn in-review) and /speckit-close (reach done). One-way (repo → ClickUp), idempotent, MCP-only."
  author: snackbyte
  license: MIT

requires:
  speckit_version: ">=0.2.0"

provides:
  commands:
    - name: speckit.clickup.provision
      file: commands/speckit.clickup.provision.md
      description: "Find-or-create the ClickUp space + shared list, record targets + the six-state status mapping, and create the feature-card in `open`"
    - name: speckit.clickup.sync
      file: commands/speckit.clickup.sync.md
      description: "Make the feature's card (body, US-subtasks, checklist, dependencies, six-state status) match the repo; idempotent, one-way; runs on every command"
    - name: speckit.verify
      file: commands/speckit.verify.md
      description: "Certify a completed feature (recursive code review + unit gate + automatable E2E), then advance the card to in-review (US8)"
    - name: speckit.close
      file: commands/speckit.close.md
      description: "Terminal close-out: re-run the gate, surface manual tasks for sign-off, mark done, final sync, commit (US2)"
    - name: speckit.clickup.design-rules
      file: commands/speckit.clickup.design-rules.md
      description: "Inspect the real workspace and propose a project-specific sync ruleset for approval; defaults apply when absent (US7)"

hooks:
  after_specify:
    command: speckit.clickup.sync
    optional: true
    description: "Sync the feature-card after specify (→ in-design)"
  after_plan:
    command: speckit.clickup.provision
    optional: true
    description: "Provision the ClickUp target after planning (card created in open)"
  after_tasks:
    command: speckit.clickup.sync
    optional: true
    description: "Sync the feature-card after task generation (→ ready)"
  after_analyze:
    command: speckit.clickup.sync
    optional: true
    description: "Sync the feature-card after analyze (→ ready)"
  after_implement:
    command: speckit.clickup.sync
    optional: true
    description: "Sync the feature-card after implementation (→ in-development)"
  after_converge:
    command: speckit.clickup.sync
    optional: true
    description: "Re-sync after converge (stays in-development until /speckit-verify passes)"

tags:
  - "clickup"
  - "tracking"
  - "sync"
