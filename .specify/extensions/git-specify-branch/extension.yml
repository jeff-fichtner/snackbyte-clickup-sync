schema_version: "1.0"

extension:
  id: git-specify-branch
  name: "Specify Branch Preparation"
  version: "1.0.0"
  description: "Before /speckit-specify: ensures the working tree is clean (asks whether to commit or stash any uncommitted changes) and that the feature is on its own git branch, so a new feature starts from a clean, ready state"
  author: snackbyte
  license: MIT

requires:
  speckit_version: ">=0.2.0"

provides:
  commands:
    - name: speckit.git.specify-branch
      file: commands/speckit.git.specify-branch.md
      description: "Clean the working area and switch to the feature branch before specifying"

hooks:
  before_specify:
    command: speckit.git.specify-branch
    optional: true
    description: "Ensure a clean working area and feature branch before specifying"

tags:
  - "git"
  - "branch"
  - "core"
