installed:
- git-specify-branch
- specify-review-loop
- analyze-autofix
- git-commit
- clickup-sync
settings:
  auto_execute_hooks: true
hooks:
  before_specify:
  - extension: git-specify-branch
    command: speckit.git.specify-branch
    enabled: true
    optional: true
    priority: 10
    prompt: Clean the working area and switch to the feature branch before specifying?
    description: Ensure a clean working area and feature branch before specifying
    condition: null
  after_specify:
  - extension: specify-review-loop
    command: speckit.specify.review-loop
    enabled: true
    optional: false
    priority: 5
    prompt: Recursively review the spec and fix unambiguous issues?
    description: Recursively review the spec and fix unambiguous issues (runs before clarify)
    condition: null
  - extension: clickup-sync
    command: speckit.clickup.sync
    enabled: true
    optional: true
    priority: 15
    prompt: Sync this feature's card to ClickUp (→ in-design)?
    description: Mirror the feature to ClickUp and advance the card to in-design
    condition: null
  before_implement:
  - extension: git-commit
    command: speckit.git.commit
    enabled: true
    optional: true
    priority: 10
    prompt: Commit this feature's spec artifacts before implementing?
    description: Checkpoint the feature's spec artifacts before implementation
    condition: null
  after_plan:
  - extension: clickup-sync
    command: speckit.clickup.provision
    enabled: true
    optional: true
    priority: 15
    prompt: Provision the ClickUp space + shared list for this feature?
    description: Find-or-create the ClickUp target and record it in the feature manifest
    condition: null
  after_tasks:
  - extension: clickup-sync
    command: speckit.clickup.sync
    enabled: true
    optional: true
    priority: 15
    prompt: Sync this feature's card to ClickUp (→ ready)?
    description: Mirror the feature-card, US-subtasks, checklist, and status; advance to ready
    condition: null
  after_analyze:
  - extension: analyze-autofix
    command: speckit.analyze.autofix
    enabled: true
    optional: true
    priority: 10
    prompt: Apply unambiguous analysis fixes and re-present the results?
    description: Apply unambiguous analysis fixes and re-present results
    condition: null
  - extension: clickup-sync
    command: speckit.clickup.sync
    enabled: true
    optional: true
    priority: 15
    prompt: Sync this feature's card to ClickUp (→ ready)?
    description: Mirror the feature and hold the card at ready (artifacts complete)
    condition: null
  after_implement:
  - extension: clickup-sync
    command: speckit.clickup.sync
    enabled: true
    optional: true
    priority: 15
    prompt: Sync this feature's card to ClickUp (→ in-development)?
    description: Mirror the feature-card, US-subtasks, checklist, and status; advance to in-development
    condition: null
  after_converge:
  - extension: clickup-sync
    command: speckit.clickup.sync
    enabled: true
    optional: true
    priority: 15
    prompt: Sync this feature's card to ClickUp (stays in-development)?
    description: Re-sync after converge; the card holds at in-development until /speckit-verify passes
    condition: null
